<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ball Crash Pro - Final Stable</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; }

        /* --- LOADING SCREEN --- */
        #loading-screen { width: 100%; height: 100vh; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; position: fixed; z-index: 20000; transition: 0.5s; }
        .load-bar { width: 250px; height: 8px; background: #222; border-radius: 10px; margin-top: 20px; overflow: hidden; border: 1px solid #333; }
        #load-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0000, #ffcc00); transition: 0.1s; }

        /* --- AUTH --- */
        #auth-container { width: 100%; height: 100vh; background: #000; display: flex; justify-content: center; align-items: center; position: fixed; z-index: 10000; }
        .auth-card { background: #111; padding: 30px; border-radius: 25px; width: 350px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; background: #222; color: #fff; outline: none; }
        .btn-ui { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .yellow { background: #ffcc00; color: #000; }
        .red { background: #ff3300; color: #fff; }
        .hidden { display: none !important; }

        /* --- DASHBOARD --- */
        #dashboard-ui { display: none; min-height: 100vh; background: #f4f7f6; color: #000; overflow-y: auto; }
        .player-header { background: #222; color: #ffcc00; text-align: center; padding: 8px; font-size: 11px; font-weight: bold; font-family: 'Orbitron'; }
        .db-nav { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .play-card { margin: 30px 20px; padding: 60px 20px; background: #fff; border-radius: 30px; border: 5px solid #ffcc00; text-align: center; cursor: pointer; }

        /* --- GAME UI --- */
        #crash-game-ui { display: none; position: fixed; inset: 0; background: #010409; z-index: 5000; }
        .game-canvas-area { height: 55vh; margin: 5px; background: radial-gradient(circle, #1a2128, #010409); border-radius: 20px; position: relative; overflow: hidden; border: 1px solid #30363d; transition: 0.2s; }
        #chart { width: 100%; height: 100%; }
        #multiplier { position: absolute; width: 100%; text-align: center; top: 35%; font-family: 'Orbitron'; font-size: 80px; font-weight: 900; z-index: 10; pointer-events: none; }
        #countdown { position: absolute; width: 100%; text-align: center; top: 65%; color: #ffcc00; font-family: 'Orbitron'; font-size: 18px; font-weight: bold; padding: 0 10px; z-index: 15; }
        
        .shake-crash { animation: shake 0.15s infinite; background: rgba(255, 0, 0, 0.4) !important; border: 2px solid #ff0000; }
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            25% { transform: translate(-2px, -1px) rotate(-1deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            75% { transform: translate(2px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .vfx-popup { position: absolute; width: 100%; text-align: center; top: 20%; font-size: 32px; font-weight: 900; z-index: 100; font-family: 'Orbitron'; text-shadow: 0 0 20px rgba(0,0,0,0.8); pointer-events: none; }
        .pop-in { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1.2); opacity: 1; } }

        .controls-panel { padding: 12px; background: #0d1117; position: absolute; bottom: 0; width: 100%; border-radius: 25px 25px 0 0; border-top: 1px solid #30363d; height: 35vh; }
        .btn-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; margin-bottom: 8px; }
        .small-btn { padding: 8px !important; font-size: 12px !important; margin: 0 !important; }
        #betInput { width: 100%; max-width: 200px; margin: 0 auto 10px auto; display: block; background: #000; color: #ffcc00; text-align: center; font-family: 'Orbitron'; font-size: 18px; padding: 8px; border-radius: 8px; border: 1px solid #333; }

        #plist { height: 75px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 12px; padding: 8px; border: 1px solid #222; font-size: 10px; }
        .p-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; padding: 5px 0; border-bottom: 1px solid #222; align-items: center; }
        .p-win { color: #00ff88; font-weight: bold; }
        
        .overlay { position: fixed; inset: 0; background: #fff; color: #000; z-index: 8000; display: none; padding: 30px; text-align: center; }
        #withdraw-approval-ui { position: fixed; inset: 0; background: #27ae60; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; padding: 20px; }
    </style>
</head>
<body>

    <audio id="app-music" src="app_background_song(48k).mp3" loop></audio>

    <div id="loading-screen">
        <h1 style="font-family:'Orbitron'; color:#ffcc00; text-shadow: 0 0 15px red;">BALL CRASH</h1>
        <div class="load-bar"><div id="load-fill"></div></div>
        <button id="start-sys-btn" class="btn-ui yellow" style="width:180px; margin-top:30px;" onclick="startLoading()">START SYSTEM</button>
    </div>

    <div id="auth-container" class="hidden">
        <div class="auth-card">
            <div id="login-form">
                <h2 style="color:#ffcc00; font-family:'Orbitron'; margin-bottom:15px;">LOGIN</h2>
                <input type="text" id="l-id" placeholder="Player ID">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-ui red" onclick="login()">LOGIN</button>
                <p onclick="showReg()" style="margin-top:15px; color:#888; font-size:12px; cursor:pointer;">No account? <span style="color:#ffcc00">Register</span></p>
            </div>
            <div id="reg-form" class="hidden">
                <h2 style="color:#ffcc00; font-family:'Orbitron'; margin-bottom:15px;">REGISTER</h2>
                <input type="password" id="r-pass" placeholder="Password (6+)">
                <button class="btn-ui yellow" onclick="register()">CREATE ACCOUNT</button>
                <p onclick="backToLogin()" style="margin-top:15px; color:#888; font-size:12px; cursor:pointer;">Back to Login</p>
            </div>
            <div id="reg-success" class="hidden">
                <p style="color:#00ff88; font-weight:bold; margin-bottom:10px;">SUCCESS!</p>
                <div style="background:#222; padding:15px; border-radius:10px; margin-bottom:15px; text-align:left; font-size:13px;">
                    ID: <span id="gen-id" style="color:#ffcc00;"></span><br>
                    PASS: <span id="gen-pass" style="color:#ffcc00;"></span>
                </div>
                <button class="btn-ui yellow" onclick="copyDetails()">COPY DETAILS</button>
                <button class="btn-ui red" onclick="backToLogin()">GO TO LOGIN</button>
            </div>
        </div>
    </div>

    <div id="dashboard-ui">
        <div class="player-header">ID: <span id="id-txt">-----</span></div>
        <div class="db-nav">
            <button onclick="window.location.href='https://t.me/UltraPodda'" style="background:#0088cc; color:#fff; border:none; padding:10px 15px; border-radius:10px; font-weight:bold;">DEPOSIT</button>
            <div style="text-align:center;">
                <p style="font-size:10px; color:#888;">BALANCE</p>
                <h2 id="db-bal" style="color:#27ae60; font-family:'Orbitron';">Rs. 0.00</h2>
            </div>
            <button onclick="openPage('withdraw-pg')" style="background:#ff3300; color:#fff; border:none; padding:10px 15px; border-radius:10px; font-weight:bold;">WITHDRAW</button>
        </div>
        <div class="play-card" onclick="launchGame()">
            <h1 style="color:#ffcc00; font-family:'Orbitron'; font-size:35px;">PLAY CRASH</h1>
            <p style="letter-spacing:5px; font-weight:bold; color:#aaa;">START EARNING</p>
        </div>
        <div style="padding:0 20px;">
            <button onclick="window.location.href='https://t.me/UltraPodda'" style="width:100%; padding:15px; background:#fff; color:#0088cc; border:1px solid #0088cc; border-radius:15px; font-weight:bold; margin-bottom:10px;">💬 CONTACT ADMIN</button>
            <button onclick="location.reload()" style="width:100%; padding:15px; background:#333; color:#fff; border:none; border-radius:15px; font-weight:bold;">LOGOUT</button>
        </div>
    </div>

    <div id="crash-game-ui">
        <div style="padding:10px; display:flex; justify-content:space-between; align-items:center;">
            <button onclick="closeGame()" style="background:#21262d; color:#fff; border:none; padding:8px 12px; border-radius:8px; font-size:12px;">← BACK</button>
            <div id="game-bal" style="color:#00ff88; font-family:'Orbitron'; font-weight:bold; font-size:14px;">Rs. 0.00</div>
            <div style="width:40px"></div>
        </div>

        <div class="game-canvas-area" id="vfx-wrap">
            <div id="multiplier">1.00x</div>
            <div id="countdown"></div>
            <div id="vfx-layer"></div>
            <canvas id="chart"></canvas>
        </div>

        <div class="controls-panel">
            <div class="btn-grid">
                <button class="btn-ui yellow small-btn" onclick="adj(20)">+20</button>
                <button class="btn-ui yellow small-btn" onclick="adj(50)">+50</button>
                <button class="btn-ui yellow small-btn" onclick="adj(100)">+100</button>
                <button class="btn-ui yellow small-btn" onclick="set('max')">MAX</button>
            </div>
            
            <input type="number" id="betInput" value="50">
            
            <button id="mainBtn" class="btn-ui red" style="margin:0 0 10px 0; padding:12px; font-size:18px; font-family:'Orbitron';" onclick="handleAction()">WAITING...</button>
            
            <div style="color: #888; font-size: 9px; font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; padding: 0 5px;">
                <span>PLAYER</span><span>BET</span><span>ODD</span><span>WIN</span>
            </div>
            <div id="plist"></div>
        </div>
    </div>

    <div id="withdraw-pg" class="overlay">
        <h2>WITHDRAW</h2>
        <p style="font-size:12px; color:#777; margin:10px 0;">Min: 1000 | Max: 49000 | Required Wager: 1.1x</p>
        <input type="number" id="w-amt" placeholder="Amount (LKR)" style="border:1px solid #ddd; padding:15px; border-radius:10px; width:100%;">
        <div id="w-status" style="margin:15px 0; font-weight:bold; font-size:14px;"></div>
        <button id="w-btn" class="btn-ui red" onclick="startWithdraw()">CONFIRM</button>
        <button class="btn-ui" style="background:#eee;" onclick="closeAll()">BACK</button>
    </div>

    <div id="withdraw-approval-ui">
        <h1>APPROVED! ✅</h1>
        <div class="receipt">
            <p>ID: <span id="rec-id"></span></p>
            <p>AMOUNT: <span id="rec-amt"></span></p>
            <p>TIME: <span id="rec-time"></span></p>
            <hr style="margin:10px 0; opacity:0.3;">
            <p style="font-size:12px;">TAKE SCREENSHOT & SEND TO ADMIN</p>
        </div>
        <button class="btn-ui yellow" onclick="window.location.href='https://t.me/UltraPodda'">SEND VIA TELEGRAM</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://crash-ball-sri-lanka-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let uID = null, bal = 0, wager = 0, dep = 0;
        let myBet = 0, isOut = false, currentM = 1.0, state = "waiting", pts = [];
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const ballImg = new Image(); ballImg.src = 'https://cdn-icons-png.flaticon.com/512/5351/5351336.png';

        function startLoading() {
            document.getElementById('app-music').play().catch(()=>{});
            document.getElementById('start-sys-btn').style.display = 'none';
            let p = 0;
            let itv = setInterval(() => {
                p += Math.random() * 15;
                if(p >= 100) { p = 100; clearInterval(itv);
                    setTimeout(() => {
                        document.getElementById('loading-screen').classList.add('hidden');
                        document.getElementById('auth-container').classList.remove('hidden');
                    }, 500);
                }
                document.getElementById('load-fill').style.width = p + "%";
            }, 100);
        }

        function register() {
            const p = document.getElementById('r-pass').value;
            if(p.length < 6) return alert("Password too short!");
            const id = "CB" + Math.floor(100000 + Math.random()*899999);
            db.ref('players/'+id).set({id, pass: p, bal: 0, wager: 0, dep: 0}).then(() => {
                document.getElementById('gen-id').innerText = id;
                document.getElementById('gen-pass').innerText = p;
                document.getElementById('reg-form').classList.add('hidden');
                document.getElementById('reg-success').classList.remove('hidden');
            });
        }

        function login() {
            const id = document.getElementById('l-id').value;
            const p = document.getElementById('l-pass').value;
            db.ref('players/'+id).once('value', s => {
                const d = s.val();
                if(d && d.pass === p) {
                    uID = id;
                    document.getElementById('id-txt').innerText = id;
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('dashboard-ui').style.display = 'block';
                    db.ref('players/'+uID).on('value', snap => {
                        const v = snap.val();
                        bal = v.bal; wager = v.wager || 0; dep = v.dep || 0;
                        document.getElementById('db-bal').innerText = "Rs. "+bal.toFixed(2);
                        document.getElementById('game-bal').innerText = "Rs. "+bal.toFixed(2);
                    });
                    initGameSync();
                } else alert("Invalid Login!");
            });
        }

        function initGameSync() {
            db.ref('live_game/timer').on('value', s => {
                let t = s.val() || 0;
                const cd = document.getElementById('countdown');
                if(state === "waiting" && t > 0) {
                    // වෙනස් කරන ලද පණිවිඩය
                    cd.innerHTML = `<span style="color:#ffcc00">NEXT ROUND IN ${t} SECONDS</span>`;
                } else { cd.innerText = ""; }
            });

            db.ref('live_game/multiplier').on('value', s => {
                currentM = s.val() || 1.0;
                if(state === "running") draw();
            });

            db.ref('live_game/state').on('value', s => {
                state = s.val();
                const btn = document.getElementById('mainBtn');
                const vfx = document.getElementById('vfx-layer');
                const wrap = document.getElementById('vfx-wrap');

                if(state === "waiting") {
                    wrap.classList.remove('shake-crash'); vfx.innerHTML = ""; pts = []; isOut = false;
                    btn.innerText = "PLACE BET"; btn.style.background = "#ffcc00"; btn.style.color = "#000"; btn.disabled = false;
                    document.getElementById('multiplier').style.color = "white";
                    document.getElementById('multiplier').innerText = "PREPARING";
                } 
                else if(state === "running") {
                    wrap.classList.remove('shake-crash');
                    if(btn.innerText === "PLACE BET") { 
                        btn.innerText = "STARTED"; btn.disabled = true; btn.style.background = "#222"; btn.style.color = "#888";
                    }
                } 
                else if(state === "crashed") {
                    wrap.classList.add('shake-crash');
                    // Multiplier එක ඇති තැන සහ Button එකේ "CRASH" ලෙස දිස්වේ
                    document.getElementById('multiplier').style.color = "#ff3300";
                    document.getElementById('multiplier').innerText = "CRASH";
                    btn.innerText = "CRASH"; btn.disabled = true; btn.style.background = "#333";
                    
                    if(myBet > 0 && !isOut) {
                        vfx.innerHTML = `<div class="vfx-popup pop-in" style="color:#00ff88;">BETTER LUCK NEXT TIME</div>`;
                        setTimeout(() => vfx.innerHTML = "", 2500);
                    }
                    myBet = 0;
                }
            });

            db.ref('live_game/players').on('value', s => {
                const list = document.getElementById('plist');
                list.innerHTML = "";
                const players = s.val();
                if(players) {
                    Object.values(players).forEach(p => {
                        let shortID = p.id ? p.id.slice(-4) : "....";
                        let betAmt = p.bet || "0";
                        let odd = p.out ? p.out + "x" : "---";
                        let win = p.out ? "Rs." + (p.bet * p.out).toFixed(0) : "Waiting";
                        let colorClass = p.out ? "p-win" : "";
                        list.innerHTML += `
                            <div class="p-row ${colorClass}">
                                <span>👤 ${shortID}</span>
                                <span>Rs.${betAmt}</span>
                                <span>${odd}</span>
                                <span>${win}</span>
                            </div>`;
                    });
                }
            });
        }

        function handleAction() {
            const btn = document.getElementById('mainBtn');
            const amt = parseFloat(document.getElementById('betInput').value);
            const vfx = document.getElementById('vfx-layer');

            if(btn.innerText === "PLACE BET") {
                if(amt > bal || amt < 20) return alert("Check Balance!");
                myBet = amt;
                db.ref('players/'+uID).update({ bal: bal - amt, wager: wager + amt });
                db.ref('live_game/players/'+uID).set({ id: uID, bet: amt, out: null });
                btn.innerText = "BET PLACED"; btn.disabled = true; btn.style.background = "#555";
            } 
            else if(btn.innerText === "CASH OUT") {
                isOut = true;
                let win = myBet * currentM;
                db.ref('players/'+uID).update({ bal: bal + win });
                db.ref('live_game/players/'+uID).update({ out: currentM.toFixed(2) });
                
                vfx.innerHTML = `<div class="vfx-popup pop-in" style="color:#ff3300;">GOOD JOB! 🏆</div>`;
                setTimeout(() => vfx.innerHTML = "", 2500);

                btn.innerText = "WIN: " + win.toFixed(0);
                btn.style.background = "#00ff88"; btn.disabled = true;
            }
        }

        function draw() {
            document.getElementById('multiplier').innerText = currentM.toFixed(2) + "x";
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            
            let x = 40 + ((currentM - 1) / 5) * (canvas.width - 80);
            let y = canvas.height - 40 - (Math.pow(currentM - 1, 1.25) * 40);
            
            pts.push({x, y});
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#ffcc00"; ctx.lineWidth = 5; ctx.lineJoin = "round";
            ctx.beginPath();
            if(pts.length > 0) {
                ctx.moveTo(pts[0].x, pts[0].y);
                pts.forEach(p => ctx.lineTo(p.x, p.y));
            }
            ctx.stroke();
            ctx.drawImage(ballImg, x - 25, y - 25, 50, 50);

            if(myBet > 0 && !isOut && state === "running") {
                const btn = document.getElementById('mainBtn');
                btn.innerText = "CASH OUT"; btn.disabled = false; btn.style.background = "#00ff88"; btn.style.color = "#000";
            }
        }

        function adj(v) { document.getElementById('betInput').value = parseInt(document.getElementById('betInput').value) + v; }
        function set(m) { if(m==='max') document.getElementById('betInput').value = Math.floor(bal); }
        function showReg() { document.getElementById('login-form').classList.add('hidden'); document.getElementById('reg-form').classList.remove('hidden'); }
        function backToLogin() { document.querySelectorAll('.auth-card > div').forEach(d=>d.classList.add('hidden')); document.getElementById('login-form').classList.remove('hidden'); }
        function launchGame() { document.getElementById('dashboard-ui').style.display='none'; document.getElementById('crash-game-ui').style.display='block'; }
        function closeGame() { document.getElementById('crash-game-ui').style.display='none'; document.getElementById('dashboard-ui').style.display='block'; }
        function openPage(id) { document.getElementById(id).style.display = 'block'; }
        function closeAll() { document.querySelectorAll('.overlay, #withdraw-approval-ui').forEach(o => o.style.display='none'); }
        function copyDetails() {
            const txt = `ID: ${document.getElementById('gen-id').innerText}\nPass: ${document.getElementById('gen-pass').innerText}`;
            navigator.clipboard.writeText(txt); alert("Details Copied!");
        }

        function startWithdraw() {
            const amt = parseFloat(document.getElementById('w-amt').value);
            const status = document.getElementById('w-status');
            const btn = document.getElementById('w-btn');
            if(amt < 1000 || amt > 49000 || bal < amt) { status.innerText = "REJECTED ❌"; return; }
            let reqWager = dep * 1.1;
            if(wager < reqWager) { status.innerText = "NEED WAGER ❌"; return; }
            btn.disabled = true; status.innerText = "UNDER REVIEW... ⏳";
            setTimeout(() => {
                bal -= amt; db.ref('players/'+uID).update({ bal: bal });
                document.getElementById('rec-id').innerText = uID;
                document.getElementById('rec-amt').innerText = "Rs. " + amt;
                document.getElementById('rec-time').innerText = new Date().toLocaleTimeString();
                document.getElementById('withdraw-pg').style.display = 'none';
                document.getElementById('withdraw-approval-ui').style.display = 'flex';
            }, 10000);
        }
    </script>
</body>
</html>
